services:
  mongodb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omc_mongodb_container
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=omc_leads_db
    volumes:
      - omc_mongodb_data:/data/db

  mongo-express:  # Interfaz gráfica para MongoDB
    image: mongo-express:latest
    container_name: omc_mongo_express_container
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=pass
    depends_on:
      - mongodb

volumes:
  omc_mongodb_data:
    driver: local
